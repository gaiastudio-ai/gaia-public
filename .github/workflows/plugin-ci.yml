name: plugin-ci

# E28-S184 — bats-tests dormancy root-cause fix. Prior config triggered on
# PRs to `main` only, so the `bats-tests` job never ran on the sprint-24
# staging -> main sequence and the coverage wrapper's silent abort stayed
# hidden. Path filter `plugins/gaia/**` keeps noise low by scoping to the
# product source surface the wrapper actually guards.
on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'plugins/gaia/**'
      - '.github/workflows/plugin-ci.yml'
      - 'scripts/audit-v2-migration.sh'
  push:
    branches: [main, staging]
    paths:
      - 'plugins/gaia/**'
      - '.github/workflows/plugin-ci.yml'
      - 'scripts/audit-v2-migration.sh'

jobs:
  frontmatter-lint:
    name: frontmatter-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Lint SKILL.md frontmatter
        run: .github/scripts/lint-skill-frontmatter.sh
      - name: Lint agent frontmatter
        run: .github/scripts/lint-agent-frontmatter.sh

  bats-tests:
    name: bats-tests
    runs-on: ubuntu-latest
    # E28-S17 AC4 originally set this to 2 minutes, but the bats suite has
    # grown past 1300 tests (E43-S5 Phase 3 testing wire-in added the final
    # 52 invocations and ~12 new @tests). The raw bats run is ~100 s on CI
    # and setup + coverage upload + cleanup push the job past the 2-minute
    # wall regardless of how tight the new tests are. Bump to 5 minutes to
    # match the cluster-* jobs; the 2-minute target remains a soft budget
    # for the bats test runtime itself (enforced by the wrapper), just not
    # the full job. Revisit if the suite exceeds ~4 minutes of raw bats.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      # E28-S175 — kcov is not in the default apt repositories on Ubuntu 24.04
      # (noble), which caused `apt-get install -y jq kcov` to fail with
      # "E: Unable to locate package kcov" on every PR and block the bats-tests
      # job before any tests ran. kcov-based line coverage is advisory-only in
      # run-with-coverage.sh (the script treats a missing kcov as a skip, not a
      # failure); the authoritative gate is NFR-052 public-function coverage,
      # which does not need kcov. Dropping kcov from the apt install restores
      # the bats-tests signal on noble. If line-coverage reporting is needed
      # later, reintroduce kcov via a pre-built binary download from the kcov
      # GitHub releases rather than apt.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run bats suite with coverage wrapper (budget-watched)
        # E45-S6 / AC3 — bats-budget-watch.sh wraps the coverage wrapper and
        # emits a structured warning to $GITHUB_STEP_SUMMARY when wall-clock
        # exceeds the threshold. Threshold (240s) is the soft budget — the
        # job's hard timeout above (5 min / 300s) remains the failing gate.
        # See ADR-062 / E45-S6-adr-memo-bats-scaling.md for the rationale and
        # plugins/gaia/docs/CI-NOTES.md for contributor guidance on adding
        # fixtures without breaking the budget.
        run: |
          bash plugins/gaia/scripts/bats-budget-watch.sh \
            --threshold-seconds 240 \
            --label bats-tests \
            -- bash plugins/gaia/tests/run-with-coverage.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-coverage
          path: coverage/
          if-no-files-found: ignore

  skills-bats-tests:
    # E55-S5 — wires the dev-story skill bats files into CI. Until this job
    # landed, skill-level bats files (e.g., gaia-dev-story planning-gate
    # regression suite) lived only on disk and never gated PRs. The first
    # batch wired in covers the /gaia-dev-story V2 hardening regression
    # suite (E55-S1/S2/S3/S5). Other skill bats under tests/skills/ predate
    # this gate and have known unrelated failures (legacy lifecycle
    # conversion fixtures); those will be wired in by a separate sweep
    # once their failures are resolved.
    name: skills-bats-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq and python3
        run: sudo apt-get update && sudo apt-get install -y jq python3
      - name: Run /gaia-dev-story skill bats suite
        run: |
          bats \
            tests/skills/gaia-dev-story-planning-gate.bats \
            tests/skills/gaia-dev-story-three-option-prompt.bats \
            tests/skills/gaia-dev-story-yolo-plan-loop.bats \
            tests/skills/gaia-dev-story-step2b-atdd.bats \
            tests/skills/gaia-dev-story-figma-degrade.bats \
            tests/skills/validate-plan-structure.bats

  cluster-4-e2e:
    name: cluster-4-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S39 AC4 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 4 e2e tests
        run: bats tests/e2e/cluster-4-analysis-e2e.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-report.sh
          bash tests/e2e/generate-report.sh /tmp/cluster-4-report.md "$PWD"
          cat /tmp/cluster-4-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-4-e2e-report
          path: /tmp/cluster-4-report.md
          if-no-files-found: ignore

  cluster-5-parity:
