# Artifact paths — relative to project_root (E60-S1 / ADR-074 contract C1).
# Resolver composes absolute paths at call time; do NOT prepend ${project_root}/.
planning_artifacts: docs/planning-artifacts
implementation_artifacts: docs/implementation-artifacts
test_artifacts: docs/test-artifacts
creative_artifacts: docs/creative-artifacts

# Dev-Story workflow knobs (E57-S1). The nested tdd_review block configures
# the post-Red TDD review gate consumed by /gaia-dev-story. Defaults:
#   threshold: medium       # off | low | medium | high — 'off' opts out
#   phases: [red]
#   qa_auto_in_yolo: true
#   qa_timeout_seconds: 600
# Uncomment + edit to override.
# dev_story:
#   tdd_review:
#     threshold: medium
#     phases: [red]
#     qa_auto_in_yolo: true
#     qa_timeout_seconds: 600

# Story-size to points mapping (E61-S1 / ADR-074 contract C1).
# Project-overridable per ADR-044 §10.26.3 with `project > global` precedence:
# the values below override the framework defaults (S=2, M=5, L=8, XL=13)
# emitted by `resolve-config.sh sizing_map`. Leave the block commented out to
# inherit the defaults; uncomment + edit to opt in to a project-specific scale.
# sizing_map:
#   S: 2
#   M: 5
#   L: 8
#   XL: 13
