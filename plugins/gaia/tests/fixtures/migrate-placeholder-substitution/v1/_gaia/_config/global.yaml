# Fixture — v1 global.yaml with literal {project-root} placeholders (E29-S8).
#
# Reproduces the v1->v2 migration bug where the literal token
# {project-root} survived intact into the v2 config because the v1 XML engine
# substituted at runtime but the v2 native engine does not.
