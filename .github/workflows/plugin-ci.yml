name: plugin-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontmatter-lint:
    name: frontmatter-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Lint SKILL.md frontmatter
        run: .github/scripts/lint-skill-frontmatter.sh
      - name: Lint agent frontmatter
        run: .github/scripts/lint-agent-frontmatter.sh

  bats-tests:
    name: bats-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Run bats tests
        run: |
          if [ ! -d tests ] || [ -z "$(ls -A tests 2>/dev/null | grep -v '^\.gitkeep$' || true)" ]; then
            echo "0 tests, 0 failures"
            exit 0
          fi
          bats tests/

  structure-validate:
    name: structure-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Validate plugin structure
        run: .github/scripts/structure-validate.sh
