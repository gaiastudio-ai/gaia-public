# Fixture: VCP-ETP-01 — full inheritance from /gaia-add-feature
# Drives the all-three-fields-present case for /gaia-edit-test-plan Step 2.
# Story: E46-S5 (FR-353)
#
# When the orchestrator (/gaia-add-feature) cascades into /gaia-edit-test-plan
# with this context, Step 2 MUST inherit all three fields verbatim and skip
# both interactive prompts ("What new test cases are needed?" and
# "Which FR/NFR IDs need test coverage?").
#
# Expected inheritance log line (Subtask 1.3 of E46-S5):
#   Step 2: inherited feature_description, prd_diff, arch_diff from upstream;
#           prompted for none.
#
# Expected internal-variable mapping (legacy names preserved per Dev Notes):
