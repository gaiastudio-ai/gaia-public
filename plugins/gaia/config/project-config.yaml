project_root: /Users/jlouage/Dev/GAIA-Framework
project_path: /Users/jlouage/Dev/GAIA-Framework/gaia-public
memory_path: /Users/jlouage/Dev/GAIA-Framework/_memory
checkpoint_path: /Users/jlouage/Dev/GAIA-Framework/_memory/checkpoints
installed_path: /Users/jlouage/Dev/GAIA-Framework/_gaia
framework_version: 1.127.2-rc.1
