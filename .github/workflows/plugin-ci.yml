name: plugin-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontmatter-lint:
    name: frontmatter-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Lint SKILL.md frontmatter
        run: .github/scripts/lint-skill-frontmatter.sh
      - name: Lint agent frontmatter
        run: .github/scripts/lint-agent-frontmatter.sh

  bats-tests:
    name: bats-tests
    runs-on: ubuntu-latest
    timeout-minutes: 2  # E28-S17 AC4 — enforce the 2-minute CI budget at job level
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq and kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y jq kcov
      - name: Run bats suite with coverage wrapper
        run: bash plugins/gaia/tests/run-with-coverage.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-coverage
          path: coverage/
          if-no-files-found: ignore

  cluster-4-e2e:
    name: cluster-4-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S39 AC4 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 4 e2e tests
        run: bats tests/e2e/cluster-4-analysis-e2e.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-report.sh
          bash tests/e2e/generate-report.sh /tmp/cluster-4-report.md "$PWD"
          cat /tmp/cluster-4-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-4-e2e-report
          path: /tmp/cluster-4-report.md
          if-no-files-found: ignore

  structure-validate:
    name: structure-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Validate plugin structure
        run: .github/scripts/structure-validate.sh
