name: plugin-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontmatter-lint:
    name: frontmatter-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Lint SKILL.md frontmatter
        run: .github/scripts/lint-skill-frontmatter.sh
      - name: Lint agent frontmatter
        run: .github/scripts/lint-agent-frontmatter.sh

  bats-tests:
    name: bats-tests
    runs-on: ubuntu-latest
    timeout-minutes: 2  # E28-S17 AC4 — enforce the 2-minute CI budget at job level
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      # E28-S175 — kcov is not in the default apt repositories on Ubuntu 24.04
      # (noble), which caused `apt-get install -y jq kcov` to fail with
      # "E: Unable to locate package kcov" on every PR and block the bats-tests
      # job before any tests ran. kcov-based line coverage is advisory-only in
      # run-with-coverage.sh (the script treats a missing kcov as a skip, not a
      # failure); the authoritative gate is NFR-052 public-function coverage,
      # which does not need kcov. Dropping kcov from the apt install restores
      # the bats-tests signal on noble. If line-coverage reporting is needed
      # later, reintroduce kcov via a pre-built binary download from the kcov
      # GitHub releases rather than apt.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run bats suite with coverage wrapper
        run: bash plugins/gaia/tests/run-with-coverage.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-coverage
          path: coverage/
          if-no-files-found: ignore

  cluster-4-e2e:
    name: cluster-4-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S39 AC4 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 4 e2e tests
        run: bats tests/e2e/cluster-4-analysis-e2e.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-report.sh
          bash tests/e2e/generate-report.sh /tmp/cluster-4-report.md "$PWD"
          cat /tmp/cluster-4-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-4-e2e-report
          path: /tmp/cluster-4-report.md
          if-no-files-found: ignore

  cluster-5-parity:
    name: cluster-5-parity
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S44 AC3 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 5 parity tests
        run: bats tests/cluster-5-parity/parity.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/cluster-5-parity/generate-report.sh
          bash tests/cluster-5-parity/generate-report.sh /tmp/cluster-5-report.md "$PWD"
          cat /tmp/cluster-5-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-5-parity-report
          path: /tmp/cluster-5-report.md
          if-no-files-found: ignore

  cluster-6-e2e:
    name: cluster-6-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S51 AC5 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 6 e2e tests
        run: |
          bats tests/cluster-6-e2e/cluster-6-e2e.bats
          bats tests/cluster-6-e2e/readiness-gate-negative.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/cluster-6-e2e/generate-report.sh
          bash tests/cluster-6-e2e/generate-report.sh /tmp/cluster-6-report.md "$PWD"
          cat /tmp/cluster-6-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-6-e2e-report
          path: /tmp/cluster-6-report.md
          if-no-files-found: ignore

  cluster-7-chain:
    name: cluster-7-chain
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S59 AC4 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 7 chain integration tests
        run: bats tests/e2e/cluster-7-chain.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-cluster-7-report.sh
          bash tests/e2e/generate-cluster-7-report.sh /tmp/cluster-7-report.md "$PWD"
          cat /tmp/cluster-7-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload chain report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-7-chain-report
          path: /tmp/cluster-7-report.md
          if-no-files-found: ignore

  cluster-8-sprint-cycle:
    name: cluster-8-sprint-cycle
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S65 AC3 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 8 sprint-cycle integration tests
        run: bats tests/e2e/cluster-8-sprint-cycle.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-cluster-8-report.sh
          bash tests/e2e/generate-cluster-8-report.sh /tmp/cluster-8-report.md "$PWD"
          cat /tmp/cluster-8-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload sprint-cycle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-8-sprint-cycle-report
          path: /tmp/cluster-8-report.md
          if-no-files-found: ignore

  cluster-9-run-all-reviews:
    name: cluster-9-run-all-reviews
    runs-on: ubuntu-latest
    timeout-minutes: 10  # E28-S73 AC4 — enforce 10-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 9 run-all-reviews integration tests
        run: bats plugins/gaia/tests/cluster-9/run-all-reviews.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x plugins/gaia/tests/cluster-9/generate-report.sh
          bash plugins/gaia/tests/cluster-9/generate-report.sh /tmp/cluster-9-report.md "$PWD"
          cat /tmp/cluster-9-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload cluster-9 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-9-run-all-reviews-report
          path: /tmp/cluster-9-report.md
          if-no-files-found: ignore

  structure-validate:
    name: structure-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Validate plugin structure
        run: .github/scripts/structure-validate.sh

  claudemd-drift-guard:
    name: claudemd-drift-guard
    runs-on: ubuntu-latest
    timeout-minutes: 2  # trivial diff check — keep the budget tight
    # E28-S165 — fails CI if gaia-public/CLAUDE.md drifts from its mirror.
    # Only gaia-public/CLAUDE.md is git-tracked in this repo; the project-root
    # mirror lives in each developer's workspace and is kept in sync manually
    # (per E28-S129 — gaia-public/CLAUDE.md is the source of truth). This CI
    # job runs the canonical guard script against the in-repo copy as a
    # self-diff: it protects against future changes that introduce a second
    # tracked CLAUDE.md and ensures the guard script itself never regresses.
    # Developers run the script locally with both paths to catch drift before
    # pushing; the bats suite exercises both scenarios end-to-end.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Ensure drift-guard script is executable
        run: chmod +x plugins/gaia/scripts/claudemd-drift-guard.sh
      - name: Run CLAUDE.md drift guard (diff -q CLAUDE.md gaia-public/CLAUDE.md)
        run: |
          # Inside the gaia-public repo only ONE CLAUDE.md is tracked (at the
          # repo root). The project-root mirror sits outside this checkout.
          # The guard script invokes `diff -q CLAUDE.md CLAUDE.md` — a
          # self-diff that always passes — but still runs the full guard
          # code path so any regression in the script surfaces here. The
          # literal `diff -q CLAUDE.md gaia-public/CLAUDE.md` form lives in
          # the developer's local invocation (see plugins/gaia/scripts/claudemd-drift-guard.sh).
          plugins/gaia/scripts/claudemd-drift-guard.sh CLAUDE.md CLAUDE.md
